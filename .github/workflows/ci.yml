name: CI — Test Suite

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r cli/requirements.txt

      - name: Run test suite
        run: python tests/test_all.py

      - name: Validate corpus schema
        run: |
          python -c "import json; data = json.load(open('corpus/seed-corpus.json')); records = data['records']; assert len(records) >= 50, f'Only {len(records)} records'; print(f'Corpus valid: {len(records)} records')"
